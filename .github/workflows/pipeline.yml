name: SuperKart MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy_to_huggingface:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      HF_USER: aldon-cabral
      HF_SPACE: SuperKart-space
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Space
        run: |
          set -euo pipefail
          
          # 1. Setup Temporary Directory
          TMP_DIR="hf_space_tmp"
          rm -rf "$TMP_DIR"
          
          # 2. Clone (Using Token for Auth)
          git clone "https://user:$HF_TOKEN@huggingface.co/spaces/$HF_USER/$HF_SPACE" "$TMP_DIR"
          
          # 3. Configure Git Identity
          cd "$TMP_DIR"
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          # 4. Sync Files from GitHub Workspace
          # Note: We use -f to ensure we don't fail if a file is missing
          cp "${{ github.workspace }}/app.py" "streamlit_app.py" || echo "app.py not found"
          cp "${{ github.workspace }}/requirements.txt" "." || echo "requirements.txt not found"
          cp "${{ github.workspace }}/README.md" "." || echo "README.md not found"

          # 5. Commit Changes
          git add .
          # Only commit if there are changes to avoid error
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "CI: update Space app from GitHub Actions"
            
            # 6. Push using the authenticated URL directly
            # This is the most reliable way in Actions to avoid "No such device" errors
            git push https://aldon-cabral:$HF_TOKEN@huggingface.co/spaces/$HF_USER/$HF_SPACE main
          fi